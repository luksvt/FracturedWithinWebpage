name: Deploy to netcup

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Repo auschecken
        uses: actions/checkout@v4

      - name: Node installieren
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Dependencies installieren
        run: npm ci

      - name: Build erstellen
        run: npm run build

      - name: Upload via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.NETCUP_HOST }}
          username: ${{ secrets.NETCUP_USER }}
          password: ${{ secrets.NETCUP_PASSWORD }}
          port: ${{ secrets.NETCUP_PORT }}
          protocol: ftp
          local-dir: dist/
          server-dir: ${{ secrets.NETCUP_REMOTE_DIR }}
